name: Production Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: STEP 1 - Checkout Repository
        uses: actions/checkout@v4

      - name: STEP 2 - Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "SSH connection successful"
            hostname

      - name: STEP 3 - Login to Gitea Registry
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_TOKEN }}" | docker login 167.233.115.93:3000 \
              -u "${{ secrets.REGISTRY_USERNAME }}" \
              --password-stdin

      - name: STEP 4 - Pull Backend Latest
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull 167.233.115.93:3000/${{ secrets.REGISTRY_USERNAME }}/backend:latest

      - name: STEP 5 - Pull Frontend Latest
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull IP:3000/${{ secrets.REGISTRY_USERNAME }}/frontend:latest

      - name: STEP 6 - Stop Old Containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker stop backend || true
            docker rm backend || true
            docker stop frontend || true
            docker rm frontend || true

      - name: STEP 7 - Start Backend Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker run -d \
              --name backend \
              -p 3000:3000 \
              --restart always \
              IP:3000/${{ secrets.REGISTRY_USERNAME }}/backend:latest

      - name: STEP 8 - Start Frontend Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker run -d \
              --name frontend \
              -p 80:80 \
              --restart always \
              IP:3000/${{ secrets.REGISTRY_USERNAME }}/frontend:latest

      - name: STEP 9 - Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker ps
            docker logs backend --tail 20 || true
            docker logs frontend --tail 20 || true