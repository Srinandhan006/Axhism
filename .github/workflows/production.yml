name: Production Deployment

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Production Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |

            echo "Logging into Gitea Registry..."

            echo "${{ secrets.REGISTRY_TOKEN }}" | docker login IP:3000 \
              -u "${{ secrets.REGISTRY_USERNAME }}" \
              --password-stdin

            echo "Pulling latest backend image..."
            docker pull 167.233.115.93:3000/sri/axhism/backend:latest

            echo "Pulling latest frontend image..."
            docker pull 167.233.115.93:3000/sri/axhism/frontend:latest

            echo "Stopping old containers..."
            docker stop backend || true
            docker rm backend || true

            docker stop frontend || true
            docker rm frontend || true

            echo "Starting backend..."
            docker run -d \
              --name backend \
              -p 3000:3000 \
              --restart always \
              167.233.115.93:3000/sri/axhism/backend:latest

            echo "Starting frontend..."
            docker run -d \
              --name frontend \
              -p 80:80 \
              --restart always \
              IP:3000/USERNAME/frontend:latest

            echo "Production deployment complete."